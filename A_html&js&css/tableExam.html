    <script>
        let html = '';
        let URL = 'http://localhost:8080/api/getDessertList';
        $(function(){
            getApi();
        });

        function getApi(){
            $.get(URL,
                // 서버가 필요한 정보를 같이 보냄.
                {},
                // 응답이 오면 호출되는 콜백 함수
                function(data, status) {
                    data.forEach(function(t, index, arr){
                        appendTest(t.name, t.image, t.desc);
                    });
                }
            );
        }
        function getApi2(){
            $.get(URL,
                // 서버가 필요한 정보를 같이 보냄.

                // 응답이 오면 호출되는 콜백 함수
                function(data, status) {
                    data.forEach(function(t, index, arr){
                        appendTest2(t.name, t.image, t.desc);
                        if (index === arr.length - 1) {
                            $('tbody').html(html);
                        }
                    });
                }
            );
        }

        function appendTest(name, image, desc){
            let tbd = $('<tbody>');
            let tr = $('<tr>');
            $('<a>').attr('href','https://www.naver.com').text(name).appendTo($('<td>')).parent().appendTo(tr);
            $('<img>').attr('src','images/'+image).attr('alt',desc).appendTo($('<td>')).parent().appendTo(tr);
            $('<td>').text(desc).appendTo(tr);
            tr.appendTo(tbd).parent().appendTo('.tb');
        }
        function appendTest2(name, image, desc) {
            html += '<tr><td><a href='+'"https://www.naver.com"'+'>'+name+'</a></td><td><img src='+'"images/'+image+'"'+'alt="'+desc+'"'+'/></td><td>'+desc+'</td></tr>';
        }
