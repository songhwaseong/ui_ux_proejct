<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Document</title>
        <style>
            div{
                border: 1px solid black;
                width: 100px;
                height: 100px;
                position: absolute;
            }
            #mydiv{
                top: 10px;
                left: 10px;
                width: 300px;
                height: 300px;
                background: bisque;
                border: 1px solid red;
                position: relative;
            }
            .test1{
                top: 20px;
                left: 0px;
                background: aqua;
            }
            .test2{
                top: 50px;
                left: 150px;
                background: fuchsia;
            }
            .test3{
                top: 150px;
                left: 30px;
                margin-right: 80px;
                background: yellow;
            }
            .test4{
                left: 120px;
                bottom: 20px;
                background: blue;
            }
            img{
                width: 100px; 
                height: 100px;
                opacity: 0.76;
            }
        </style>
    </head>
    <body>
        <div id="mydiv">
            <div class="test1"><img src="images/americano01.png" alt="Americano01"/></div>
            <div class="test2"><img src="images/basil.jpg" alt="basil"></div>
            <div class="test3"><img src="images/chamomile.jpg" alt="chamomile"></div>
            <div class="test4"><img src="images/lemonbalm.jpg" alt="lemonBalm"></div>
        </div>
    </body>
</html>
