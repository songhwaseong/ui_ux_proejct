<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>fruitList</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
      body {
        font-family: Arial, sans-serif;
      }

      .container {
        margin: 20px;
      }

      table {
        width: 100%;
        border-collapse: collapse; /* 테두리 합치기 */
      }

      thead {
        background-color: #f2f2f2;
      }

      th, td {
        border: 1px solid #ddd;
        padding: 10px;
        text-align: center;
      }
      /* 가상(pseudo) 클래스 */
      td:hover {
        background-color: #f5f5f5; /* hover 효과 */
      }

      th {
        font-weight: bold;
      }
    </style>
</head>
<body>
  <table>
    <thead>
      <tr>
        <th>아이디</th>
        <th>상품명</th>
        <th>단가</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>사과</td>
        <td>3,000원</td>
      </tr>
      <tr>
        <td>2</td>
        <td>바나나</td>
        <td>2,500원</td>
      </tr>
      <tr>
        <td>3</td>
        <td>딸기</td>
        <td>5,000원</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
