<!doctype html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>장바구니</title>
      <style>
          body{
              font-family: Arial, sans-serif;
          }
          .container{
              width: 80%;
              margin: 30px auto;
          }
          table{
              width: 100%;
              border-collapse: collapse;
          }
          table, th,td{
              border: 1px solid #CCCCCC;
          }
          th, td {
              padding: 10px;
              text-align: center;
              vertical-align: middle;
          }

          thead {
              background-color: #f2f2f2;
          }

          .row {
              display: flex;
              align-items: center;
          }

          .col-4 {
              width: 30%;
          }

          .col-8 {
              width: 70%;
              display: flex;
              align-items: center;
          }

          img {
              border: 1px solid #DDDDDD;
              border-radius: 5px;
          }

          input[type="number"] {
              width: 80px;
              text-align: center;
          }

          .btn {
              padding: 5px 10px;
              border: none;
              cursor: pointer;
          }

          .btn-danger {
              background-color: red;
              color: white;
          }

          .btn-primary {
              background-color: blue;
              color: white;
              padding: 10px 20px;
          }

          .text-end {
              text-align: right;
          }

          .mt-3 {
              margin-top: 15px;
          }

          .mb-4 {
              margin-bottom: 20px;
          }

          .product{
              width: 80px;
              height: 80px;
          }

      </style>
  </head>
  <body>
    <div class="container">
        <h2 class="mb-4">
            <span style="color: #9da714c4; font-size: 2rem;">홍길동</span>
            <span style="font-size: 1.3rem;">님의 장바구니</span>
        </h2>
        <table>
            <thead>
              <tr>
                <th style="font-size: 1.2rem;"><input type="checkbox">전체 선택</th>
                <th style="font-size: 1.2rem;">상품 정보</th>
                <th style="font-size: 1.2rem;">수량</th>
                <th style="font-size: 1.2rem;">금액</th>
                <th style="font-size: 1.2rem;">삭제</th>
              </tr>
            </thead>
            <tbody>
              <tr id="trId">
                <td><input id="bx1" class="chbx" type="checkbox" checked></td>
                <td class="row">
                    <div class="col-4">
                        <img class="product" src="/images/americano01.png" alt="노트북" >
                    </div>
                    <div class="col-8">
                        아메리카노
                    </div>
                </td>
                <td><input type="number" onchange="javascript:chngPr(this)" value="1" min="1"></td>
                <td id="pr1">4500</td>
                <td><button onclick="javascript:remove(this);" class="btn btn-danger">삭제</button></td>
              </tr>
              <tr id="trId2">
                  <td><input id="bx2" class="chbx" type="checkbox" ></td>
                  <td class="row">
                      <div class="col-4">
                          <img class="product" src="/images/chamomile.jpg" alt="노트북">
                      </div>
                      <div class="col-8">
                          캐모마일
                      </div>
                  </td>
                <td><input type="number" value="2" min="1"></td>
                <td id="pr2">14500</td>
                <td><button onclick="javascript:remove(this);"  class="btn btn-danger">삭제</button></td>
              </tr>
            </tbody>
        </table>
        <h3 id="tpr">총 주문금액 : 10100</h3>
        <div class="text-end">
            <button class="btn btn-primary">
                주문하기
            </button>
        </div>
    </div>

    <script>
        let pr1 = document.querySelector('#pr1').innerHTML;
        let pr2 = document.querySelector('#pr2').innerHTML;
        let tpr = Number(pr1)+Number(pr2);
        document.getElementById('pr1').innerHTML = pr1.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        document.getElementById('pr2').innerHTML = pr2.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        document.getElementById('tpr').innerHTML = '총 주문금액 : '+ tpr.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        function remove(el){

            console.log(el);
            let chbx = el.parentNode.parentNode.children[0].firstChild;
            let pr = el.parentNode.parentNode.children[3].firstChild.textContent;
            if(!chbx.checked){
                alert('체크하지 않았습니다.');
                return;
            }
            tpr  = tpr - noComa(pr);
            document.getElementById('tpr').innerHTML = '총 주문금액 : '+ (tpr).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
            el.parentNode.parentNode.remove();
        }

        function chngPr(el){
            return Number(prc.toString().replace(/,/g,''));
        }
        function noComa(prc){
            return Number(prc.toString().replace(/,/g,''));
        }

    </script>
  </body>
</html>
