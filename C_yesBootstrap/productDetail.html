<script>
    const urlParams = new URLSearchParams(window.location.search);
    const parmId = urlParams.get('id');

    let isGetData = true;
    const showLoading = (id) => {

        document.querySelectorAll('.dip').forEach(el => {
            el.style.display = 'none';
        });
        document.getElementById(id).style.display = 'block';
    }
    let URL = 'http://localhost:8080/api/getDessert';            //상품상세 조회
    async function fetchData(){
        try {
            // 1. API 호출 (삭제된 ID 저장해서 있으면 해당 ID 상품 조회)
            const response = await fetch(URL+'?id='+parmId);

            // 2. 응답 상태 확인
            if (!response.ok) {
                throw new Error('네트워크 응답이 좋지 않습니다.');
            }

            // 3. JSON 데이터로 변환
            const json = await response.json();
            dispDessert(json);
        } catch (error) {
            console.error('데이터 가져오기 실패:', error);
        }
    }
    const successEl = document.getElementById('successView');
    const dispDessert = item =>  {
        const col  = document.createElement('div');
        col.className = 'card';
        col.innerHTML = `
            <div class="row">
                <div class="col-md-4">
                    <img src="/images/${item.image}" class="rounded" alt="아메리카노" style="width: 100%;height: 400px">
                </div>
                <div class="col-md-8">
                    <div class="card-body">
                        <h3>${item.name}</h3>
                        <table class="table table-striped">
                            <thead>
                            </thead>
                            <tbody>
                            <tr>
                                <td class="text-center">가격</td>
                                <td>${item.price}원</td>
                            </tr>
                            <tr>
                                <td class="text-center">카테고리</td>
                                <td>${item.category}</td>
                            </tr>
                            <tr>
                                <td class="text-center">재고</td>
                                <td>${item.stock}개</td>
                            </tr>
                            <tr>
                                <td class="text-center">설명</td>
                                <td>${item.desc}</td>
                            </tr>
                            <tr>
                                <td class="text-center">등록 일자</td>
                                <td>${item.regDate}</td>
                            </tr>
                            </tbody>
                        </table>
                        <div class="row mb-3 align-items-center">
                            <div class="col-3 text-center">
                                <strong>구매 수량</strong>
                            </div>
                            <div class="col-5">
                                <input type="number" min="1" value="${item.quantity}" class="form-control">
                            </div>
                        </div>
                        <!-- 버튼 -->
                        <div class="d-flex justify-content-center mt-3">
                            <a href="/product/list" class="btn btn-primary me-3 px-4">
                                이전 목록
                            </a>
                            <button class="btn btn-success me-3 px-4"
                                    onclick="alert('장바구니 기능 (예시)')">
                                장바구니
                            </button>
                            <button class="btn btn-danger me-3 px-4">
                                주문하기
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        `;
        successEl.appendChild(col);
        isGetData = false;
    }

    fetchData();
</script>
