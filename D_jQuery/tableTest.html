<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Table Example</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

<div class="container mt-5">
    <h3>회원 목록</h3>

    <button class="btn btn-success mb-3" id="addBtn">데이터 추가</button>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>이름</th>
            <th>이메일</th>
            <th>권한</th>
        </tr>
        </thead>
        <tbody id="userTable"></tbody>
    </table>

    <!-- 선택된 행 정보 -->
    <div id="result" class="mt-4 p-3 border bg-light">
        선택된 회원 정보가 여기에 표시됩니다.
    </div>
</div>

<script>
    let id = 1;

    // 데이터 추가
    $("#addBtn").click(function() {
        const row = `
        <tr>
            <td>${id}</td>
            <td>사용자${id}</td>
            <td>user${id}@test.com</td>
            <td>${id % 2 === 0 ? 'ADMIN' : 'USER'}</td>
        </tr>
    `;
        $("#userTable").append(row);
        id++;
    });


    //삭제해봐
    const timerId = setInterval(() => {
        const first = $("#userTable tr").first();
        $("#userTable").append(first);
    }, 50);


    // 🔥 더블클릭 → 정보 출력
    $(document).on("dblclick", "#userTable tr", function() {

        const td = $(this).children();

        const userInfo = {
            id: td.eq(0).text(),
            name: td.eq(1).text(),
            email: td.eq(2).text(),
            role: td.eq(3).text()
        };

        $("#result").html(`
        <h5>선택된 회원 정보</h5>
        <p><b>ID:</b> ${userInfo.id}</p>
        <p><b>이름:</b> ${userInfo.name}</p>
        <p><b>이메일:</b> ${userInfo.email}</p>
        <p><b>권한:</b> ${userInfo.role}</p>
    `);
    });


    // 🔥 우클릭 → 삭제
    $(document).on("contextmenu", "#userTable tr", function(e) {
        e.preventDefault(); // 기본 우클릭 메뉴 제거

        const td = $(this).children();
        const name = td.eq(1).text();

        if (confirm(`${name} 데이터를 삭제하시겠습니까?`)) {
            $(this).remove();

            // 선택된 정보 초기화 (선택된 행을 삭제했을 경우 대비)
            $("#result").html("선택된 회원 정보가 여기에 표시됩니다.");
        }
    });
</script>

</body>
</html>
